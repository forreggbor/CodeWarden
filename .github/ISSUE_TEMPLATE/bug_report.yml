name: Bug Report
description: Report a bug or unexpected behaviour
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: CodeWarden version
      placeholder: "e.g. v1.05.01"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: The exact command you ran
      placeholder: "CodeWarden -d /var/www/myproject -u"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include full terminal output if relevant
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Bash version
      placeholder: "e.g. Ubuntu 24.04, Bash 5.2"
